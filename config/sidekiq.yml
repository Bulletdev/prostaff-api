---
# Sidekiq Configuration File

# Concurrency = number of Sidekiq threads = DB pool slots consumed.
# Supabase Nano (2 vCPU / 2 GB) + PgBouncer session mode: keep this low.
# Puma: 4 workers x 5 threads = 20 connections (api container).
# Sidekiq: 10 connections (sidekiq container).
# Total: ~30 conexoes simultaneas de banco.
# Sidekiq: DB_POOL should match concurrency (set both in your env together).
# Recommended production env: SIDEKIQ_CONCURRENCY=10 DB_POOL=10
:concurrency: <%= ENV.fetch('SIDEKIQ_CONCURRENCY', 10).to_i %>
:timeout: <%= ENV.fetch('SIDEKIQ_TIMEOUT', 25).to_i %>
:verbose: <%= ENV.fetch('SIDEKIQ_VERBOSE', 'true') == 'true' %>
:queues:
  - critical
  - high
  - default
  - events
  - search
  - mailers
  - low
  - meta_intelligence
  - low_priority

# Sidekiq Scheduler Configuration
:schedule:
  # Cleanup expired tokens daily at 2 AM
  cleanup_expired_tokens:
    cron: '0 2 * * *'
    class: Authentication::CleanupExpiredTokensJob
    description: 'Clean up expired password reset tokens and blacklisted JWT tokens'

  # Refresh database metadata materialized views every 2 hours.
  # These views cache table privileges, extensions and policies which change
  # rarely. Running every 30m was consuming ~72% of total DB time (879ms avg).
  refresh_metadata_views:
    cron: '0 */2 * * *'
    class: Analytics::RefreshMetadataViewsJob
    description: 'Refresh materialized views for database metadata (table privileges, extensions, policies)'

  # Historical backfill — CBLOL main split (highest priority, runs first)
  historical_backfill_cblol:
    cron: '0 4 * * *'
    class: Competitive::HistoricalBackfillJob
    queue: low_priority
    args:
      - league: 'CBLOL'
    description: 'Backfill CBLOL main split (Leaguepedia → ES → Rails DB)'

  # CBLOL Academy — runs 30min after CBLOL to avoid scraper contention
  historical_backfill_academy:
    cron: '30 4 * * *'
    class: Competitive::HistoricalBackfillJob
    queue: low_priority
    args:
      - league: 'CBLOL Academy'
    description: 'Backfill CBLOL Academy (Leaguepedia → ES → Rails DB)'

  # Circuito Desafiante — runs 1h after CBLOL
  historical_backfill_cd:
    cron: '0 5 * * *'
    class: Competitive::HistoricalBackfillJob
    queue: low_priority
    args:
      - league: 'Circuito Desafiante'
    description: 'Backfill Circuito Desafiante (Leaguepedia → ES → Rails DB)'

  # Request and expire scrim result reports daily at 10 AM UTC
  scrim_result_reminders:
    cron: '0 10 * * *'
    class: ScrimResultReminderJob
    queue: default
    description: 'Initialize pending result reports, send deadline reminders, expire overdue reports'

  # Rebuild AI champion matrices and vectors nightly at 3 AM UTC
  rebuild_ai_matrices:
    cron: '0 3 * * *'
    class: AiIntelligence::RebuildChampionMatrixJob
    queue: low_priority
    description: 'Rebuild AI champion matrices and vectors nightly'

  # Ping Riot platform status API every 6 hours to keep the job heartbeat alive.
  # Ensures StatusSnapshotJob reports riot_api as operational without burning player-data rate limit.
  riot_api_ping:
    cron: '0 */6 * * *'
    class: RiotApiPingJob
    queue: low
    description: 'Ping Riot status API to keep health check heartbeat alive'

  # Record component health snapshots every 15 minutes for uptime history.
  # Reduced from */5 to avoid excessive DB/Redis pressure from 6 checks per run.
  status_snapshot:
    cron: '*/15 * * * *'
    class: StatusSnapshotJob
    queue: default
    description: 'Record component health snapshots for uptime history'

  # Daily contract expiry alerts at 8 AM UTC.
  # Flags contracts approaching expiry at 90/60/30/14/7-day thresholds.
  contract_expiry_alerts:
    cron: '0 8 * * *'
    class: Manager::ContractExpiryAlertJob
    queue: default
    description: 'Daily contract expiry alerts'

  # Nightly goal evaluation at 6 AM UTC.
  # Resolves metric values for evaluable TeamGoals, writes GoalCheckIn records,
  # recomputes status (on_track / at_risk / met / missed), and fires events.
  evaluate_goals:
    cron: '0 6 * * *'
    class: Goals::EvaluateGoalsJob
    queue: default
    description: 'Auto-evaluate team goals and create check-in records'

  # Nightly GCD sync at 3 AM UTC — upserts Leaguepedia contract data into market_registrations.
  sync_gcd:
    cron: '0 3 * * *'
    class: Scouting::SyncGcdJob
    queue: default
    description: 'Sync Leaguepedia Global Contract Database into market_registrations'

  # Nightly contract bonus evaluation at 7 AM UTC.
  # Resolves metric values for structured ContractBonuses within their evaluation
  # window and marks them as achieved when the comparator condition is satisfied.
  evaluate_bonuses:
    cron: '0 7 * * *'
    class: Manager::EvaluateBonusesJob
    queue: default
    description: 'Auto-evaluate structured contract bonuses via MetricResolver'

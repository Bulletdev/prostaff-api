server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers (server block — applied to all locations that do NOT
    # define their own add_header directives; repeated in child blocks below
    # because nginx drops parent add_header when a child block adds its own).
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Allow swagger-ui and Google Fonts to load resources
    add_header Content-Security-Policy "default-src 'self' https://unpkg.com; style-src 'self' 'unsafe-inline' https://unpkg.com https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'unsafe-inline' https://unpkg.com; img-src 'self' data: https:; connect-src 'self' https://api.prostaff.gg https://unpkg.com;" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check for Traefik / Coolify
    # Use default_type instead of add_header to avoid overriding server-level
    # security headers (nginx drops all parent add_header when a location block
    # defines its own — semgrep rule: nginx/header-redefinition).
    location /health {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # Cache static assets
    # All server-block security headers are intentionally repeated here because
    # nginx silently drops ALL parent add_header directives when a location block
    # defines its own add_header. This is the correct pattern — not a bug.
    # nosemgrep: generic.nginx.security.header-redefinition.header-redefinition
    location ~* \.(css|js|png|jpg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable" always; # nosemgrep: generic.nginx.security.header-redefinition.header-redefinition
        add_header X-Frame-Options "SAMEORIGIN" always; # nosemgrep: generic.nginx.security.header-redefinition.header-redefinition
        add_header X-Content-Type-Options "nosniff" always; # nosemgrep: generic.nginx.security.header-redefinition.header-redefinition
        add_header X-XSS-Protection "1; mode=block" always; # nosemgrep: generic.nginx.security.header-redefinition.header-redefinition
        add_header Referrer-Policy "strict-origin-when-cross-origin" always; # nosemgrep: generic.nginx.security.header-redefinition.header-redefinition
        add_header Content-Security-Policy "default-src 'self' https://unpkg.com; style-src 'self' 'unsafe-inline' https://unpkg.com https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'unsafe-inline' https://unpkg.com; img-src 'self' data: https:; connect-src 'self' https://api.prostaff.gg https://unpkg.com;" always; # nosemgrep: generic.nginx.security.header-redefinition.header-redefinition
    }

    gzip on;
    gzip_vary on;
    gzip_types text/css application/javascript text/javascript application/json;
}

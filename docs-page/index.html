<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ProStaff API Docs</title>
  <meta name="description" content="ProStaff API V1 reference documentation. Esports Team Management Platform.">
  <link rel="icon" href="logo.png" type="image/png">

  <!-- Swagger UI CSS -->
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5.11.0/swagger-ui.css">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── ProStaff Retro Design Tokens ─────────────────────────────── */
    :root {
      --gold:        #C89B3C;
      --gold-dim:    rgba(200,155,60,0.5);
      --gold-faint:  rgba(200,155,60,0.12);
      --blue:        #0C223F;
      --blue-dark:   #0A1929;
      --bg:          #0A0E1A;
      --card:        #0F1823;
      --teal:        #0596AA;
      --text:        rgba(255,255,255,0.85);
      --text-dim:    rgba(255,255,255,0.45);
      --green:       #00D364;
      --red:         #FF4444;
      --border:      1px solid #C89B3C;
      --font:        Verdana, Geneva, Tahoma, sans-serif;
    }

    /* ── Patterns ─────────────────────────────────────────────────── */
    .pat-scanline {
      background-image: repeating-linear-gradient(
        0deg, transparent, transparent 3px,
        rgba(200,155,60,0.04) 3px, rgba(200,155,60,0.04) 4px
      );
    }
    .pat-diagonal {
      background-image: repeating-linear-gradient(
        45deg, transparent, transparent 6px,
        rgba(200,155,60,0.03) 6px, rgba(200,155,60,0.03) 7px
      );
    }

    /* ── Base ─────────────────────────────────────────────────────── */
    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      line-height: 1.5;
      min-height: 100vh;
    }

    body {
      background-image:
        linear-gradient(rgba(200,155,60,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(200,155,60,0.035) 1px, transparent 1px);
      background-size: 32px 32px;
    }

    /* ── RetroPanel ───────────────────────────────────────────────── */
    .retro-panel { width: 100%; position: relative; }

    .retro-panel-header {
      display: flex;
      border-top: var(--border);
      border-left: var(--border);
      border-right: var(--border);
      position: relative;
      overflow: hidden;
    }

    .retro-panel-header-left {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 56px;
      min-height: 52px;
      background: linear-gradient(135deg, var(--blue) 0%, var(--blue-dark) 100%);
      border-right: var(--border);
      position: relative;
      overflow: hidden;
    }

    .retro-panel-header-right {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 8px 12px;
      min-height: 52px;
      background: linear-gradient(135deg, var(--blue) 0%, var(--blue-dark) 100%);
      position: relative;
      overflow: hidden;
    }

    .retro-panel-category {
      font-size: 8px;
      color: var(--teal);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      font-weight: bold;
      margin-bottom: 2px;
    }

    .retro-panel-title {
      font-size: 12px;
      font-weight: bold;
      color: var(--gold);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      text-shadow: 0 1px 6px rgba(200,155,60,0.5);
      position: relative;
      z-index: 1;
    }

    .retro-panel-subtitle {
      font-size: 9px;
      color: var(--gold-dim);
      letter-spacing: 0.05em;
      position: relative;
      z-index: 1;
      margin-top: 2px;
    }

    .retro-panel-divider {
      height: 1px;
      background: linear-gradient(to right, var(--gold), rgba(200,155,60,0.12) 60%, transparent);
    }

    .retro-panel-body {
      background: var(--card);
      border-left: var(--border);
      border-right: var(--border);
      position: relative;
    }

    .retro-panel-body-stripe {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: linear-gradient(to bottom, var(--gold), rgba(200,155,60,0.12) 60%, transparent);
      z-index: 1;
      pointer-events: none;
    }

    .retro-panel-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      height: 18px;
      background: linear-gradient(to right, var(--blue), var(--bg));
      border-bottom: var(--border);
      border-left: var(--border);
      border-right: var(--border);
    }

    .retro-panel-footer-label {
      font-size: 8px;
      color: var(--gold-dim);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    /* ── RetroCorners ─────────────────────────────────────────────── */
    .retro-corners { position: absolute; inset: 0; pointer-events: none; z-index: 2; }
    .rc { position: absolute; width: 10px; height: 10px; }
    .rc-tl { top: 0; left: 0; border-top: 2px solid var(--gold); border-left: 2px solid var(--gold); }
    .rc-tr { top: 0; right: 0; border-top: 2px solid var(--gold); border-right: 2px solid var(--gold); }
    .rc-bl { bottom: 0; left: 0; border-bottom: 2px solid var(--gold); border-left: 2px solid var(--gold); }
    .rc-br { bottom: 0; right: 0; border-bottom: 2px solid var(--gold); border-right: 2px solid var(--gold); }

    /* ── RetroDiamond ─────────────────────────────────────────────── */
    .diamond {
      width: 5px; height: 5px;
      background: var(--gold);
      transform: rotate(45deg);
      flex-shrink: 0;
      display: inline-block;
    }
    .diamond-sm { width: 4px; height: 4px; }

    /* ── Footer diamonds ──────────────────────────────────────────── */
    .footer-diamonds { display: flex; align-items: center; gap: 6px; }
    .footer-line { height: 1px; width: 20px; background: linear-gradient(to right, var(--gold), transparent); }
    .footer-line-r { background: linear-gradient(to left, var(--gold), transparent); }

    /* ── Site Header ──────────────────────────────────────────────── */
    .site-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      height: 56px;
      background: linear-gradient(to right, var(--blue-dark), var(--bg));
      position: relative;
    }
    .site-header::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(to right, var(--gold), var(--gold-faint) 60%, transparent);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--gold);
      font-size: 13px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      text-shadow: 0 1px 6px rgba(200,155,60,0.4);
    }
    .logo img { width: 28px; height: 28px; object-fit: contain; }

    .site-nav { display: flex; gap: 16px; align-items: center; }
    .site-nav a {
      text-decoration: none;
      color: var(--text-dim);
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    .site-nav a:hover { color: var(--gold); }

    .header-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      font-size: 9px;
      font-weight: bold;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--teal);
      border: 1px solid rgba(5,150,170,0.4);
      background: rgba(5,150,170,0.08);
    }

    /* ── Main container ───────────────────────────────────────────── */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px 16px;
    }

    /* ── Custom Search Bar ────────────────────────────────────────── */
    .custom-search-wrap {
      padding: 14px 0 10px;
      border-bottom: 1px solid var(--gold-faint);
      margin-bottom: 12px;
    }
    .custom-search-wrap label {
      display: block;
      font-size: 9px;
      color: var(--gold-dim);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .custom-search-row {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--blue-dark);
      border: 1px solid var(--gold-faint);
      padding: 7px 12px;
      transition: border-color 0.2s;
    }
    .custom-search-row:focus-within { border-color: var(--gold-dim); }
    .custom-search-row svg { flex-shrink: 0; color: var(--gold-dim); }
    .custom-search-row input {
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--font);
      font-size: 12px;
      width: 100%;
    }
    .custom-search-row input::placeholder { color: var(--text-dim); }
    #search-count {
      font-size: 10px;
      color: var(--text-dim);
      margin-top: 5px;
      min-height: 14px;
    }
    #search-count span { color: var(--gold); }

    /* ── Swagger wrapper ──────────────────────────────────────────── */
    #swagger-ui-wrapper {
      padding: 0 16px 16px 20px;
      min-height: 400px;
    }

    /* ── Site Footer ──────────────────────────────────────────────── */
    .site-footer {
      border-top: 1px solid var(--gold-faint);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 0.05em;
      flex-wrap: wrap;
      gap: 8px;
      background: linear-gradient(to right, var(--blue-dark), var(--bg));
      margin-top: 24px;
    }
    .site-footer a { color: var(--text-dim); text-decoration: none; }
    .site-footer a:hover { color: var(--gold); }

    /* ══════════════════════════════════════════════════════════════
       SWAGGER UI DARK THEME OVERRIDES
       ══════════════════════════════════════════════════════════════ */

    /* ── Base reset ─────────────────────────────────────────────── */
    .swagger-ui {
      font-family: var(--font) !important;
      color: var(--text) !important;
    }

    /* Hide default topbar */
    .swagger-ui .topbar { display: none !important; }

    /* ── Info section ───────────────────────────────────────────── */
    .swagger-ui .info { margin: 16px 0 !important; }
    .swagger-ui .info .title {
      font-family: var(--font) !important;
      font-size: 20px !important;
      font-weight: bold !important;
      color: var(--gold) !important;
      text-transform: uppercase !important;
      letter-spacing: 0.06em !important;
      text-shadow: 0 1px 8px rgba(200,155,60,0.4) !important;
    }
    .swagger-ui .info .title small {
      background: rgba(5,150,170,0.15) !important;
      border: 1px solid rgba(5,150,170,0.4) !important;
      color: var(--teal) !important;
      padding: 2px 8px !important;
      font-size: 10px !important;
      letter-spacing: 0.1em !important;
      border-radius: 0 !important;
    }
    .swagger-ui .info p,
    .swagger-ui .info li { color: var(--text-dim) !important; font-size: 12px !important; }
    .swagger-ui .info a { color: var(--teal) !important; }

    /* ── Scheme container (servers) ─────────────────────────────── */
    .swagger-ui .scheme-container {
      background: var(--blue-dark) !important;
      border: 1px solid var(--gold-faint) !important;
      box-shadow: none !important;
      padding: 12px 16px !important;
      border-radius: 0 !important;
    }
    .swagger-ui .schemes > label {
      color: var(--gold-dim) !important;
      font-family: var(--font) !important;
      font-size: 10px !important;
      letter-spacing: 0.1em !important;
      text-transform: uppercase !important;
    }
    .swagger-ui .servers > label {
      color: var(--gold-dim) !important;
      font-family: var(--font) !important;
      font-size: 10px !important;
    }
    .swagger-ui select {
      background: var(--card) !important;
      color: var(--text) !important;
      border: 1px solid var(--gold-faint) !important;
      border-radius: 0 !important;
      font-family: var(--font) !important;
      font-size: 12px !important;
      padding: 4px 8px !important;
    }

    /* ── Authorize button ───────────────────────────────────────── */
    .swagger-ui .btn.authorize {
      background: var(--gold-faint) !important;
      border: 1px solid var(--gold-dim) !important;
      border-radius: 0 !important;
      color: var(--gold) !important;
      font-family: var(--font) !important;
      font-size: 10px !important;
      font-weight: bold !important;
      letter-spacing: 0.1em !important;
      text-transform: uppercase !important;
      padding: 5px 14px !important;
    }
    .swagger-ui .btn.authorize svg { fill: var(--gold) !important; }
    .swagger-ui .btn.authorize:hover {
      background: rgba(200,155,60,0.2) !important;
      border-color: var(--gold) !important;
    }

    /* ── Tags (operation groups) ────────────────────────────────── */
    .swagger-ui .opblock-tag {
      border-bottom: 1px solid var(--gold-faint) !important;
      font-family: var(--font) !important;
    }
    .swagger-ui .opblock-tag a.nostyle {
      color: var(--gold) !important;
      font-size: 13px !important;
      font-weight: bold !important;
      text-transform: uppercase !important;
      letter-spacing: 0.05em !important;
    }
    .swagger-ui .opblock-tag:hover { background: var(--gold-faint) !important; }
    .swagger-ui .opblock-tag small {
      color: var(--text-dim) !important;
      font-size: 11px !important;
    }

    /* ── Operation blocks ───────────────────────────────────────── */
    .swagger-ui .opblock {
      border-radius: 0 !important;
      margin: 4px 0 !important;
      border: 1px solid var(--gold-faint) !important;
      background: var(--card) !important;
      box-shadow: none !important;
    }
    .swagger-ui .opblock .opblock-summary {
      border: none !important;
      background: transparent !important;
    }
    .swagger-ui .opblock .opblock-summary-method {
      border-radius: 0 !important;
      font-family: var(--font) !important;
      font-size: 10px !important;
      font-weight: bold !important;
      letter-spacing: 0.08em !important;
      min-width: 60px !important;
    }
    .swagger-ui .opblock .opblock-summary-path {
      color: var(--text) !important;
      font-family: var(--font) !important;
      font-size: 12px !important;
    }
    .swagger-ui .opblock .opblock-summary-description {
      color: var(--text-dim) !important;
      font-family: var(--font) !important;
      font-size: 11px !important;
    }

    /* Method colors */
    .swagger-ui .opblock.opblock-get    { border-color: rgba(5,150,170,0.35) !important; }
    .swagger-ui .opblock.opblock-post   { border-color: rgba(0,211,100,0.35) !important; }
    .swagger-ui .opblock.opblock-put    { border-color: rgba(245,158,11,0.35) !important; }
    .swagger-ui .opblock.opblock-patch  { border-color: rgba(200,155,60,0.35) !important; }
    .swagger-ui .opblock.opblock-delete { border-color: rgba(255,68,68,0.35) !important; }

    .swagger-ui .opblock.opblock-get    .opblock-summary { background: rgba(5,150,170,0.05) !important; }
    .swagger-ui .opblock.opblock-post   .opblock-summary { background: rgba(0,211,100,0.05) !important; }
    .swagger-ui .opblock.opblock-put    .opblock-summary { background: rgba(245,158,11,0.05) !important; }
    .swagger-ui .opblock.opblock-patch  .opblock-summary { background: rgba(200,155,60,0.05) !important; }
    .swagger-ui .opblock.opblock-delete .opblock-summary { background: rgba(255,68,68,0.05) !important; }

    .swagger-ui .opblock.opblock-get    .opblock-summary-method { background: var(--teal) !important; }
    .swagger-ui .opblock.opblock-post   .opblock-summary-method { background: var(--green) !important; color: #000 !important; }
    .swagger-ui .opblock.opblock-put    .opblock-summary-method { background: #F59E0B !important; color: #000 !important; }
    .swagger-ui .opblock.opblock-patch  .opblock-summary-method { background: var(--gold) !important; color: #000 !important; }
    .swagger-ui .opblock.opblock-delete .opblock-summary-method { background: var(--red) !important; }

    /* ── Expanded operation body ────────────────────────────────── */
    .swagger-ui .opblock-body { background: var(--bg) !important; }
    .swagger-ui .opblock-description-wrapper p { color: var(--text-dim) !important; font-family: var(--font) !important; }
    .swagger-ui table thead tr td, .swagger-ui table thead tr th {
      color: var(--gold-dim) !important;
      font-family: var(--font) !important;
      font-size: 10px !important;
      letter-spacing: 0.08em !important;
      text-transform: uppercase !important;
      border-bottom: 1px solid var(--gold-faint) !important;
    }
    .swagger-ui table tbody tr td {
      color: var(--text) !important;
      font-family: var(--font) !important;
      font-size: 12px !important;
      border-bottom: 1px solid rgba(200,155,60,0.06) !important;
    }

    /* ── Parameters ─────────────────────────────────────────────── */
    .swagger-ui .parameters-col_description p { color: var(--text-dim) !important; font-family: var(--font) !important; }
    .swagger-ui .parameter__name { color: var(--gold) !important; font-family: var(--font) !important; }
    .swagger-ui .parameter__in { color: var(--teal) !important; font-size: 10px !important; }
    .swagger-ui .parameter__type { color: var(--text-dim) !important; font-size: 11px !important; }
    .swagger-ui .prop-format { color: var(--text-dim) !important; font-size: 10px !important; }

    /* ── Input fields ────────────────────────────────────────────── */
    .swagger-ui input[type=text], .swagger-ui textarea {
      background: var(--blue-dark) !important;
      color: var(--text) !important;
      border: 1px solid var(--gold-faint) !important;
      border-radius: 0 !important;
      font-family: var(--font) !important;
      font-size: 12px !important;
    }
    .swagger-ui input[type=text]:focus, .swagger-ui textarea:focus {
      border-color: var(--gold-dim) !important;
      outline: none !important;
      box-shadow: 0 0 0 2px var(--gold-faint) !important;
    }

    /* ── Buttons ─────────────────────────────────────────────────── */
    .swagger-ui .btn {
      border-radius: 0 !important;
      font-family: var(--font) !important;
      font-size: 10px !important;
      font-weight: bold !important;
      letter-spacing: 0.08em !important;
      text-transform: uppercase !important;
    }
    .swagger-ui .btn-sm { padding: 3px 8px !important; }
    .swagger-ui .execute-wrapper .btn.execute {
      background: var(--gold) !important;
      color: var(--blue-dark) !important;
      border: none !important;
    }
    .swagger-ui .execute-wrapper .btn.execute:hover {
      background: #d4a84a !important;
    }
    .swagger-ui .btn.cancel {
      background: transparent !important;
      border: 1px solid var(--gold-faint) !important;
      color: var(--text-dim) !important;
    }
    .swagger-ui .btn.try-out__btn {
      border-color: var(--gold-dim) !important;
      color: var(--gold) !important;
      background: var(--gold-faint) !important;
    }

    /* ── Response section ───────────────────────────────────────── */
    .swagger-ui .responses-wrapper { background: var(--bg) !important; }
    .swagger-ui .response-col_status { color: var(--gold) !important; font-family: var(--font) !important; font-weight: bold !important; }
    .swagger-ui .response-col_description { color: var(--text-dim) !important; font-family: var(--font) !important; }
    .swagger-ui .response-col_links { color: var(--teal) !important; }
    .swagger-ui .response { background: var(--card) !important; }
    .swagger-ui .highlight-code { background: var(--blue-dark) !important; }
    .swagger-ui .microlight { background: var(--blue-dark) !important; color: var(--teal) !important; font-size: 11px !important; }

    /* ── Models section ─────────────────────────────────────────── */
    .swagger-ui section.models {
      border: 1px solid var(--gold-faint) !important;
      border-radius: 0 !important;
      background: var(--card) !important;
    }
    .swagger-ui section.models h4 {
      color: var(--gold) !important;
      font-family: var(--font) !important;
      font-size: 12px !important;
      font-weight: bold !important;
      text-transform: uppercase !important;
      letter-spacing: 0.06em !important;
    }
    .swagger-ui section.models .model-container {
      background: var(--bg) !important;
      border: 1px solid var(--gold-faint) !important;
    }
    .swagger-ui .model-title { color: var(--gold-dim) !important; font-family: var(--font) !important; }
    .swagger-ui .model { color: var(--text) !important; font-family: var(--font) !important; font-size: 12px !important; }
    .swagger-ui .prop-type { color: var(--teal) !important; }
    .swagger-ui .prop-name { color: var(--text) !important; }

    /* ── Labels & misc text ─────────────────────────────────────── */
    .swagger-ui label {
      color: var(--text-dim) !important;
      font-family: var(--font) !important;
      font-size: 11px !important;
    }
    .swagger-ui .required { color: var(--red) !important; }
    .swagger-ui .markdown p { color: var(--text-dim) !important; font-family: var(--font) !important; }
    .swagger-ui .loading-container .loading::after { border-color: var(--gold) transparent transparent !important; }

    /* ── Errors ─────────────────────────────────────────────────── */
    .swagger-ui .errors-wrapper {
      background: rgba(255,68,68,0.08) !important;
      border: 1px solid rgba(255,68,68,0.3) !important;
      border-radius: 0 !important;
    }
    .swagger-ui .errors-wrapper .errors h4 { color: var(--red) !important; font-family: var(--font) !important; }
    .swagger-ui .errors-wrapper .errors .message { color: var(--text-dim) !important; font-family: var(--font) !important; font-size: 11px !important; }

    /* ── Wrapper background ─────────────────────────────────────── */
    .swagger-ui .wrapper { background: transparent !important; padding: 0 !important; max-width: 100% !important; }
    .swagger-ui .opblock-tag-section { background: transparent !important; }

    /* ── Scrollbar ──────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--gold-faint); border-radius: 0; }
    ::-webkit-scrollbar-thumb:hover { background: var(--gold-dim); }

    /* ── Responsive ─────────────────────────────────────────────── */
    @media (max-width: 600px) {
      .site-nav { display: none; }
    }
  </style>

    SwaggerUIBundle({
      url: 'https://api.prostaff.gg/api-docs/v1/swagger.yaml',
      dom_id: '#swagger-ui',
      deepLinking: true,
      presets: [
        SwaggerUIBundle.presets.apis,
        SwaggerUIStandalonePreset
      ],
      plugins: [
        SwaggerUIBundle.plugins.DownloadUrl
      ],
      layout: 'StandaloneLayout',
      defaultModelsExpandDepth: 1,
      defaultModelExpandDepth: 1,
      docExpansion: 'list',
      tryItOutEnabled: false,
      validatorUrl: false,
    });
  };
</script>

<script>
// ── Custom Endpoint Search ────────────────────────────────────────────
(function () {
  var timer;
  var ready = false;
  var input = document.getElementById('custom-search');
  var counter = document.getElementById('search-count');

  function allOps() { return document.querySelectorAll('.opblock'); }

  function doFilter(raw) {
    var query = raw.trim().toLowerCase();

    // Reset
    if (!query) {
      document.querySelectorAll('.opblock-tag-section').forEach(function (s) { s.style.display = ''; });
      allOps().forEach(function (op) { op.style.display = ''; });
      counter.innerHTML = '';
      return;
    }

    var terms = query.split(/\s+/).filter(Boolean);
    var matched = 0;
    var total = allOps().length;

    document.querySelectorAll('.opblock-tag-section').forEach(function (section) {
      // Tag name itself (e.g. "Authentication", "Players")
      var tagText = (section.querySelector('.opblock-tag') || {}).textContent || '';
      var tagMatches = terms.every(function (t) { return tagText.toLowerCase().includes(t); });

      var sectionHasMatch = false;

      section.querySelectorAll('.opblock').forEach(function (op) {
        var path    = (op.querySelector('.opblock-summary-path')        || {}).textContent || '';
        var summary = (op.querySelector('.opblock-summary-description') || {}).textContent || '';
        var method  = (op.querySelector('.opblock-summary-method')      || {}).textContent || '';
        var full    = (path + ' ' + summary + ' ' + method).toLowerCase();

        var opMatch = tagMatches || terms.every(function (t) { return full.includes(t); });
        op.style.display = opMatch ? '' : 'none';
        if (opMatch) { sectionHasMatch = true; matched++; }
      });

      section.style.display = sectionHasMatch ? '' : 'none';
    });

    counter.innerHTML = '<span>' + matched + '</span> of <span>' + total + '</span> endpoints';
  }

  input.addEventListener('input', function (e) {
    clearTimeout(timer);
    timer = setTimeout(function () { doFilter(e.target.value); }, 200);
  });

  // Wait for SwaggerUI to render before first filter run
  var observer = new MutationObserver(function () {
    if (!ready && document.querySelector('.opblock')) {
      ready = true;
      if (input.value) doFilter(input.value);
    }
  });
  var root = document.getElementById('swagger-ui') || document.body;
  observer.observe(root, { childList: true, subtree: true });
})();
</script>

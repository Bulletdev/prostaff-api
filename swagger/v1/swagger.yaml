  "/api/v1/tournaments":
    get:
      summary: List active tournaments
      description: "Returns all active tournaments ordered by scheduled start date. Cached per organization for 30 minutes. Public endpoint — no authentication required."
      tags:
      - Tournaments
      description: Returns all tournaments in registration_open, seeding or in_progress
        status. Public endpoint.
      responses:
        '200':
          description: tournaments returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      "$ref": "#/components/schemas/Tournament"
              example:
                data:
                - id: v2w3x4y5-z6a7-8901-bcde-456789012345
                  name: CBLOL Community Cup Abril 2026
                  game: league_of_legends
                  format: double_elimination
                  status: registration_open
                  max_teams: 16
                  enrolled_teams_count: 7
                  slots_available: true
                  bracket_generated: false
                  bo_format: 3
                  current_round_label:
                  registration_closes_at: '2026-04-28T23:59:00.000Z'
                  scheduled_start_at: '2026-05-03T14:00:00.000Z'
    post:
      summary: Create a tournament
      description: "Creates a tournament in draft status. Restricted to admin and owner roles. Cache is not pre-warmed — first read after create will miss the cache."
      tags:
      - Tournaments
      description: Admin only. Creates a new tournament in draft status.
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - name
              properties:
                name:
                  type: string
                game:
                  type: string
                  default: league_of_legends
                max_teams:
                  type: integer
                  default: 16
                entry_fee_cents:
                  type: integer
                prize_pool_cents:
                  type: integer
                bo_format:
                  type: integer
                  default: 3
                scheduled_start_at:
                  type: string
                  format: date-time
                registration_closes_at:
                  type: string
                  format: date-time
                rules:
                  type: string
      responses:
        '201':
          description: tournament created
          content:
            application/json:
              schema:
                type: object
              example:
                message: Tournament created successfully
                data:
                  id: v2w3x4y5-z6a7-8901-bcde-456789012345
                  name: CBLOL Community Cup Abril 2026
                  game: league_of_legends
                  format: double_elimination
                  status: draft
                  max_teams: 16
                  enrolled_teams_count: 0
                  bo_format: 3
                  created_at: '2026-04-21T10:00:00.000Z'
        '422':
          description: validation error
        '403':
          description: admin access required
  "/api/v1/tournaments/{id}":
    get:
      summary: Show tournament with bracket
      description: "Returns tournament details including the full double-elimination bracket. Cached for 30 minutes. Cache is invalidated on update. Public endpoint — no authentication required."
      tags:
      - Tournaments
      description: Returns tournament data including all bracket matches. Public endpoint.
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: tournament returned
          content:
            application/json:
              schema:
                type: object
              example:
                data:
                  id: v2w3x4y5-z6a7-8901-bcde-456789012345
                  name: CBLOL Community Cup Abril 2026
                  game: league_of_legends
                  format: double_elimination
                  status: in_progress
                  max_teams: 16
                  enrolled_teams_count: 16
                  slots_available: false
                  bracket_generated: true
                  bo_format: 3
                  current_round_label: Winners Round 2
                  scheduled_start_at: '2026-05-03T14:00:00.000Z'
                  started_at: '2026-05-03T14:10:00.000Z'
                  matches:
                  - id: w3x4y5z6-a7b8-9012-cdef-567890123456
                    bracket_side: winners
                    round_label: Winners Round 1
                    round_order: 1
                    match_number: 1
                    status: completed
                    team_a_name: Team ProStaff BR
                    team_b_name: LOUD Esports
                    team_a_score: 2
                    team_b_score: 0
                    bo_format: 3
        '404':
          description: not found
    patch:
      summary: Update a tournament
      description: "Updates tournament metadata and invalidates the tournament list and individual tournament caches. Restricted to admin and owner roles."
      tags:
      - Tournaments
      security:
      - bearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                status:
                  type: string
                  enum:
                  - draft
                  - registration_open
                  - seeding
                  - in_progress
                  - finished
                  - cancelled
      responses:
        '200':
          description: tournament updated
          content:
            application/json:
              schema:
                type: object
              example:
                message: Tournament updated successfully
                data:
                  id: v2w3x4y5-z6a7-8901-bcde-456789012345
                  name: CBLOL Community Cup Abril 2026
                  status: registration_open
        '403':
          description: admin access required
  "/api/v1/tournaments/{id}/generate_bracket":
    post:
      summary: Generate double-elimination bracket
      description: "Generates the double-elimination bracket from enrolled and approved teams. Can only be called once per tournament. Sets status to 'in_progress'. Restricted to admin and owner roles."
      tags:
      - Tournaments
      description: Admin only. Creates all 30 TournamentMatch records and wires FK
        self-references for bracket progression.
      security:
      - bearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        '200':
          description: bracket generated, tournament returned with matches
          content:
            application/json:
              schema:
                type: object
              example:
                message: Bracket generated successfully
                data:
                  id: v2w3x4y5-z6a7-8901-bcde-456789012345
                  name: CBLOL Community Cup Abril 2026
                  status: seeding
                  bracket_generated: true
                  matches_count: 30
        '422':
          description: bracket already exists
        '403':
          description: admin access required

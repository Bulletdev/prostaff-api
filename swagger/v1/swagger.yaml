---
openapi: 3.0.1
info:
  title: ProStaff API V1
  version: v1
  description: API documentation for ProStaff - Esports Team Management Platform
  contact:
    name: ProStaff Support
    email: support@prostaff.gg
servers:
- url: http://localhost:3333
  description: Development server
- url: https://api.prostaff.gg
  description: Production server
paths:
  "/api/v1/admin/players":
    get:
      summary: List all players across all organizations (admin)
      description: "Bypasses organization scoping — admin and owner roles see players from all organizations, including soft-deleted ones. Non-admin users see only their own org. Useful for cross-org audits and support workflows."
      tags:
      - Admin
      security:
      - bearerAuth: []
      parameters:
      - name: page
        in: query
        required: false
        schema:
          type: integer
      - name: per_page
        in: query
        required: false
        schema:
          type: integer
      - name: include_deleted
        in: query
        required: false
        description: Include soft-deleted players
        schema:
          type: boolean
      - name: role
        in: query
        required: false
        schema:
          type: string
      - name: status
        in: query
        required: false
        schema:
          type: string
      - name: has_access
        in: query
        required: false
        description: Filter by whether player portal access is enabled
        schema:
          type: boolean
      - name: sort_by
        in: query
        required: false
        schema:
          type: string
      - name: sort_order
        in: query
        required: false
        description: asc or desc
        schema:
          type: string
      responses:
        '200':
          description: players returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  players:
                    type: array
                    items:
                      "$ref": "#/components/schemas/Player"
                  pagination:
                    "$ref": "#/components/schemas/Pagination"
                  summary:
                    type: object
                    properties:
                      total:
                        type: integer
                      active:
                        type: integer
                      deleted:
                        type: integer
                      with_access:
                        type: integer
              example:
                message: Players retrieved successfully
                data:
                  players:
                  - id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                    summoner_name: Ranger
                    real_name: Carlos Henrique
                    role: adc
                    status: active
                    solo_queue_tier: CHALLENGER
                    solo_queue_rank: I
                    solo_queue_lp: 842
                    win_rate: 64.3
                    player_access_enabled: true
                  - id: b2c3d4e5-f6a7-8901-bcde-f12345678901
                    summoner_name: Grevthar
                    real_name: Gustavo Ferreira
                    role: support
                    status: active
                    solo_queue_tier: GRANDMASTER
                    solo_queue_rank: I
                    solo_queue_lp: 312
                    win_rate: 58.1
                    player_access_enabled: false
                  pagination:
                    current_page: 1
                    per_page: 20
                    total_pages: 1
                    total_count: 2
                    has_next_page: false
                    has_prev_page: false
                  summary:
                    total: 2
                    active: 2
                    deleted: 0
                    with_access: 1
        '401':
          description: unauthorized
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
              example:
                status: 401
                error: Unauthorized
                message: Invalid or expired token
        '403':
          description: forbidden — admin/owner role required
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
      x-codeSamples:
      - lang: Shell
        label: cURL
        source: |-
          curl -X GET https://api.prostaff.gg/api/v1/admin/players \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json"
      - lang: Ruby
        label: Ruby (Faraday)
        source: |-
          require 'faraday'

          conn = Faraday.new('https://api.prostaff.gg') do |f|
            f.request :json
            f.response :json
          end

          response = conn.get("/api/v1/admin/players") do |req|
            req.headers['Authorization'] = "Bearer #{token}"
          end

          puts response.body
      - lang: JavaScript
        label: JavaScript (fetch)
        source: |-
          const response = await fetch(`https://api.prostaff.gg/api/v1/admin/players`, {
            method: 'GET',
            headers: {
              'Authorization': `Bearer ${token}`,
              'Content-Type': 'application/json'
            }
          });

          const data = await response.json();
          console.log(data);
  "/api/v1/admin/players/{id}/soft_delete":
    post:
      summary: Soft-delete (archive) a player
      description: "Sets deleted_at timestamp and changes status to 'removed'. The player record is preserved for audit purposes but hidden from standard queries. Action is logged to the audit trail. Use restore to undo."
      tags:
      - Admin
      security:
      - bearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: player archived
          content:
            application/json:
              schema:
                type: object
                properties:
                  player:
                    "$ref": "#/components/schemas/Player"
              example:
                message: Player archived successfully
                data:
                  player:
                    id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                    summoner_name: Ranger
                    status: archived
                    deleted_at: '2026-04-21T10:30:00.000Z'
                    removed_reason: Player left the organization
        '404':
          description: player not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
              example:
                status: 404
                error: Not Found
                message: Record not found
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  example: Player left the organization
              required:
              - reason
      x-codeSamples:
      - lang: Shell
        label: cURL
        source: |-
          curl -X POST https://api.prostaff.gg/api/v1/admin/players/<id>/soft_delete \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"reason":"Player left the organization"}'
      - lang: Ruby
        label: Ruby (Faraday)
        source: |-
          require 'faraday'

          conn = Faraday.new('https://api.prostaff.gg') do |f|
            f.request :json
            f.response :json
          end

          id = '<id>'

          response = conn.post("/api/v1/admin/players/#{id}/soft_delete") do |req|
            req.headers['Authorization'] = "Bearer #{token}"
            req.body = {"reason" => "Player left the organization"}
          end

          puts response.body
      - lang: JavaScript
        label: JavaScript (fetch)
        source: |-
          const id = '<id>';

          const response = await fetch(`https://api.prostaff.gg/api/v1/admin/players/${id}/soft_delete`, {
            method: 'POST',
            headers: {
              'Authorization': `Bearer ${token}`,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
            "reason": "Player left the organization"
          })
          });

          const data = await response.json();
          console.log(data);
  "/api/v1/admin/players/{id}/restore":
    post:
      summary: Restore an archived player
      description: "Clears the deleted_at timestamp and sets the player status to the value provided (defaults to 'inactive'). Action is logged. Cannot be used to bypass the 'removed' status path — use change_status for standard status transitions."
      tags:
      - Admin
      security:
      - bearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: player restored
          content:
            application/json:
              schema:
                type: object
                properties:
                  player:
                    "$ref": "#/components/schemas/Player"
              example:
                message: Player restored successfully
                data:
                  player:
                    id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                    summoner_name: Ranger
                    status: active
                    deleted_at:
                    removed_reason:
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum:
                  - active
                  - inactive
                  - benched
                  - trial
                  example: active
              required:
              - status
      x-codeSamples:
      - lang: Shell
        label: cURL
        source: |-
          curl -X POST https://api.prostaff.gg/api/v1/admin/players/<id>/restore \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"status":"active"}'
      - lang: Ruby
        label: Ruby (Faraday)
        source: |-
          require 'faraday'

          conn = Faraday.new('https://api.prostaff.gg') do |f|
            f.request :json
            f.response :json
          end

          id = '<id>'

          response = conn.post("/api/v1/admin/players/#{id}/restore") do |req|
            req.headers['Authorization'] = "Bearer #{token}"
            req.body = {"status" => "active"}
          end

          puts response.body
      - lang: JavaScript
        label: JavaScript (fetch)
        source: |-
          const id = '<id>';

          const response = await fetch(`https://api.prostaff.gg/api/v1/admin/players/${id}/restore`, {
            method: 'POST',
            headers: {
              'Authorization': `Bearer ${token}`,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
            "status": "active"
          })
          });

          const data = await response.json();
          console.log(data);
  "/api/v1/admin/players/{id}/enable_access":
    post:
      summary: Enable player portal access
      description: "Creates player-specific login credentials (email + password). Once enabled, the player can authenticate via POST /auth/player-login and receive a player-scoped JWT token with limited permissions. Action is logged to the audit trail."
      tags:
      - Admin
      security:
      - bearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: player access enabled
          content:
            application/json:
              schema:
                type: object
                properties:
                  player:
                    "$ref": "#/components/schemas/Player"
              example:
                message: Player portal access enabled
                data:
                  player:
                    id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                    summoner_name: Ranger
                    player_access_enabled: true
                    player_email: ranger@teamprostaff.gg
        '422':
          description: validation error
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
              example:
                status: 422
                error: Unprocessable Entity
                errors:
                  email:
                  - has already been taken
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                  example: player@team.gg
                password:
                  type: string
                  format: password
                  example: SecurePass123!
              required:
              - email
              - password
      x-codeSamples:
      - lang: Shell
        label: cURL
        source: |-
          curl -X POST https://api.prostaff.gg/api/v1/admin/players/<id>/enable_access \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"email":"player@team.gg","password":"SecurePass123!"}'
      - lang: Ruby
        label: Ruby (Faraday)
        source: |-
          require 'faraday'

          conn = Faraday.new('https://api.prostaff.gg') do |f|
            f.request :json
            f.response :json
          end

          id = '<id>'

          response = conn.post("/api/v1/admin/players/#{id}/enable_access") do |req|
            req.headers['Authorization'] = "Bearer #{token}"
            req.body = {"email" => "player@team.gg", "password" => "SecurePass123!"}
          end

          puts response.body
      - lang: JavaScript
        label: JavaScript (fetch)
        source: |-
          const id = '<id>';

          const response = await fetch(`https://api.prostaff.gg/api/v1/admin/players/${id}/enable_access`, {
            method: 'POST',
            headers: {
              'Authorization': `Bearer ${token}`,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
            "email": "player@team.gg",
            "password": "SecurePass123!"
          })
          });

          const data = await response.json();
          console.log(data);
  "/api/v1/admin/players/{id}/disable_access":
    post:
      summary: Disable player portal access
      description: "Revokes the player's ability to log in via the player portal. Existing active player tokens remain valid until expiry — the player cannot obtain new ones. Action is logged to the audit trail."
      tags:
      - Admin
      security:
      - bearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: player access disabled
          content:
            application/json:
              schema:
                type: object
                properties:
                  player:
                    "$ref": "#/components/schemas/Player"
              example:
                message: Player portal access disabled
                data:
                  player:
                    id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                    summoner_name: Ranger
                    player_access_enabled: false
                    player_email:
      x-codeSamples:
      - lang: Shell
        label: cURL
        source: |-
          curl -X POST https://api.prostaff.gg/api/v1/admin/players/<id>/disable_access \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json"
      - lang: Ruby
        label: Ruby (Faraday)
        source: |-
          require 'faraday'

          conn = Faraday.new('https://api.prostaff.gg') do |f|
            f.request :json
            f.response :json
          end

          id = '<id>'

          response = conn.post("/api/v1/admin/players/#{id}/disable_access") do |req|
            req.headers['Authorization'] = "Bearer #{token}"
          end

          puts response.body
      - lang: JavaScript
        label: JavaScript (fetch)
        source: |-
          const id = '<id>';

          const response = await fetch(`https://api.prostaff.gg/api/v1/admin/players/${id}/disable_access`, {
            method: 'POST',
            headers: {
              'Authorization': `Bearer ${token}`,
              'Content-Type': 'application/json'
            }
          });

          const data = await response.json();
          console.log(data);
  "/api/v1/admin/players/{id}/change_status":
    post:
      summary: Change the status of a non-archived player
      description: "Transitions a player between active, inactive, benched, or trial statuses. Cannot set status to 'removed' — use the soft_delete endpoint for archival. Blocked on archived players. Action is logged."
      tags:
      - Admin
      security:
      - bearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: player status changed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  player:
                    "$ref": "#/components/schemas/Player"
              example:
                message: Player status updated to benched
                data:
                  player:
                    id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                    summoner_name: Ranger
                    status: benched
        '422':
          description: invalid status or player is archived
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/Error"
              example:
                status: 422
                error: Unprocessable Entity
                errors:
                  status:
                  - is not valid for archived players
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum:
                  - active
                  - inactive
                  - benched
                  - trial
                  example: benched
              required:
              - status
      x-codeSamples:
      - lang: Shell
        label: cURL
        source: |-
          curl -X POST https://api.prostaff.gg/api/v1/admin/players/<id>/change_status \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"status":"benched"}'
      - lang: Ruby
        label: Ruby (Faraday)
        source: |-
          require 'faraday'

          conn = Faraday.new('https://api.prostaff.gg') do |f|
            f.request :json
            f.response :json
          end

          id = '<id>'

          response = conn.post("/api/v1/admin/players/#{id}/change_status") do |req|
            req.headers['Authorization'] = "Bearer #{token}"
            req.body = {"status" => "benched"}
          end

          puts response.body
      - lang: JavaScript
        label: JavaScript (fetch)
        source: |-
          const id = '<id>';

          const response = await fetch(`https://api.prostaff.gg/api/v1/admin/players/${id}/change_status`, {
            method: 'POST',
            headers: {
              'Authorization': `Bearer ${token}`,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
            "status": "benched"
          })
          });

          const data = await response.json();
          console.log(data);
  "/api/v1/admin/players/{id}/transfer":
    post:
      summary: Transfer player to another organization
      description: "Moves the player record to a new organization, sets status to 'inactive', and stores the previous organization_id for history. Runs in a database transaction. Action is logged to the audit trail."
      tags:
      - Admin
      security:
      - bearerAuth: []
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: player transferred
          content:
            application/json:
              schema:
                type: object
                properties:
                  player:
                    "$ref": "#/components/schemas/Player"
                  previous_organization:
                    type: string
                  new_organization:
                    type: string
              example:
                message: Player transferred successfully
                data:
                  player:
                    id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                    summoner_name: Ranger
                    status: active
                  previous_organization: Team ProStaff BR
                  new_organization: LOUD Esports
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                new_organization_id:
                  type: string
                  format: uuid
                  example: org-uuid-here
                reason:
                  type: string
                  nullable: true
                  example: Trade agreement
              required:
              - new_organization_id
      x-codeSamples:
      - lang: Shell
        label: cURL
        source: |-
          curl -X POST https://api.prostaff.gg/api/v1/admin/players/<id>/transfer \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"new_organization_id":"org-uuid-here"}'
      - lang: Ruby
        label: Ruby (Faraday)
        source: |-
          require 'faraday'

          conn = Faraday.new('https://api.prostaff.gg') do |f|
            f.request :json
            f.response :json
          end

          id = '<id>'

          response = conn.post("/api/v1/admin/players/#{id}/transfer") do |req|
            req.headers['Authorization'] = "Bearer #{token}"
            req.body = {"new_organization_id" => "org-uuid-here"}
          end

          puts response.body
      - lang: JavaScript
        label: JavaScript (fetch)
        source: |-
          const id = '<id>';

          const response = await fetch(`https://api.prostaff.gg/api/v1/admin/players/${id}/transfer`, {
            method: 'POST',
            headers: {
              'Authorization': `Bearer ${token}`,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
            "new_organization_id": "org-uuid-here"
          })
          });

          const data = await response.json();
          console.log(data);
  "/api/v1/admin/audit-logs":
    get:
      summary: List audit logs
      description: "Read-only access to the platform's audit log. Restricted to admin and owner roles. Logs capture all create/update/delete actions on players, matches, and other entities, including old and new values."
      tags:
      - Admin
      security:
      - bearerAuth: []
      parameters:
      - name: page
        in: query
        required: false
        schema:
          type: integer
      - name: per_page
        in: query
        required: false
        schema:
          type: integer
      - name: action
        in: query
        required: false
        description: Filter by action type (e.g. soft_delete, transfer)
        schema:
          type: string
      - name: entity_type
        in: query
        required: false
        description: Filter by entity type (e.g. Player, Organization)
        schema:
          type: string
      - name: user_id
        in: query
        required: false
        schema:
          type: string
      responses:
        '200':
          description: audit logs returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  logs:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        user:
                          type: object
                        organization:
                          type: object
                        action:
                          type: string
                        entity_type:
                          type: string
                        entity_id:
                          type: string
                        old_values:
                          type: object
                          nullable: true
                        new_values:
                          type: object
                          nullable: true
                        created_at:
                          type: string
                          format: date-time
                  pagination:
                    "$ref": "#/components/schemas/Pagination"
              example:
                data:
                  logs:
                  - id: c3d4e5f6-a7b8-9012-cdef-123456789012
                    user:
                      id: d4e5f6a7-b8c9-0123-defa-234567890123
                      name: Coach Rafael
                      email: coach@teamprostaff.gg
                    organization:
                      id: 3b334bac-5ca2-4405-bf73-deac8a3e7ceb
                      name: Team ProStaff BR
                    action: soft_delete
                    entity_type: Player
                    entity_id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
                    old_values:
                      status: active
                    new_values:
                      status: archived
                      removed_reason: Contract expired
                    created_at: '2026-04-21T14:22:00.000Z'
                  pagination:
                    current_page: 1
                    per_page: 20
                    total_pages: 1
                    total_count: 1
                    has_next_page: false
                    has_prev_page: false
      x-codeSamples:
      - lang: Shell
        label: cURL
        source: |-
          curl -X GET https://api.prostaff.gg/api/v1/admin/audit-logs \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json"
      - lang: Ruby
        label: Ruby (Faraday)
        source: |-
          require 'faraday'

          conn = Faraday.new('https://api.prostaff.gg') do |f|
            f.request :json
            f.response :json
          end

          response = conn.get("/api/v1/admin/audit-logs") do |req|
            req.headers['Authorization'] = "Bearer #{token}"
          end

          puts response.body
      - lang: JavaScript
        label: JavaScript (fetch)
        source: |-
          const response = await fetch(`https://api.prostaff.gg/api/v1/admin/audit-logs`, {
            method: 'GET',
            headers: {
              'Authorization': `Bearer ${token}`,
              'Content-Type': 'application/json'
            }
          });

          const data = await response.json();
          console.log(data);
  "/api/v1/admin/organizations":
    get:
      summary: List all organizations (admin)
      description: "Platform-level view of all organizations. Supports search (backed by Meilisearch with SQL fallback), filtering by tier and subscription status. Restricted to admin and owner roles."
      tags:
      - Admin
      security:
      - bearerAuth: []
      parameters:
      - name: page
        in: query
        required: false
        schema:
          type: integer
      - name: per_page
        in: query
        required: false
        schema:
          type: integer
      - name: search
        in: query
        required: false
        schema:
          type: string
      - name: tier
        in: query
        required: false
        schema:
          type: string
      - name: status
        in: query
        required: false
        schema:
          type: string
      responses:
        '200':
          description: organizations returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  organizations:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        slug:
                          type: string
                        region:
                          type: string
                        tier:
                          type: string
                        subscription_plan:
                          type: string
                        subscription_status:
                          type: string
                        users_count:
